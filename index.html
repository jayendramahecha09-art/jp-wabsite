<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Jayendra - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; line-height: 1.6; background: #f4f7f6; color: #333; }
        
        /* Navbar */
        nav { background: #2c3e50; padding: 1rem; display: flex; justify-content: center; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 600; }

        /* Header */
        header { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; padding: 50px 20px; text-align: center; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid white; margin-bottom: 15px; }

        /* Container */
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 10px; }
        h2 { margin-top: 20px; color: #2c3e50; }

        /* Contact Form */
        form { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* Footer Icons */
        .social-links { text-align: center; margin-top: 20px; font-size: 1.5rem; }
        .social-links a { margin: 0 10px; color: #2c3e50; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <header id="home">
        <img src="profile.jpg" alt="Profile" class="profile-img">
        <h1>Jayendra Mahecha</h1>
        <p>Web Developer | Designer</p>
    </header>

    <div class="container">
        <h2 id="projects">My Projects</h2>
        <p>Yahan mere banaye huye projects hain:</p>
        <ul>
            <li>Project 1: Professional Portfolio</li>
            <li>Project 2: Responsive Landing Page</li>
        </ul>

        <h2 id="contact">Contact Me</h2>
        <form>
            <input type="text" placeholder="Aapka Naam" required>
            <input type="email" placeholder="Aapka Email" required>
            <textarea placeholder="Aapka Message" rows="4"></textarea>
            <button type="submit">Send Message</button>
        </form>

        <div class="social-links">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</body>
</html>
