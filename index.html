<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Website</title>
    <style>
        /* General Styles */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        
        /* Navigation */
        nav { background: #974a4a; padding: 1rem; text-align: center; }
        nav a { color: white; margin: 0 10px; text-decoration: none; font-weight: bold; }
        
        /* Header */
        header { background: #2c3e50; color: white; padding: 40px 20px; text-align: center; }
        
        /* Profile Image */
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #333333; margin: 20px auto; display: block; }
        
        /* Section */
        .container { padding: 20px; text-align: center; max-width: 800px; margin: auto; }
        
        /* Mobile ke liye settings (Responsive) */
        @media (max-width: 600px) {
            nav a { display: block; margin: 10px 0; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>

    <header>
        <h1>Jayendra's Website</h1>
        <p>Welcome to my professional portfolio</p>
    </header>

    <div class="container">
        <img src="profile.jpg" alt="Profile" class="profile-img">
        
        <h2>About Me</h2>
        <p>Main ek aspiring web developer hoon. Yeh website har device par responsive hai.</p>
    </div>

</body>
</html>
